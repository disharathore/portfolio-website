# Nginx Site Configuration — __DOMAIN__
# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — processed by deploy.sh at deploy time.
# Placeholders (__UPPER_SNAKE__) are replaced with values from site config.
# Do NOT edit the deployed copy in /etc/nginx/sites-available/ — it will be
# overwritten on next deploy. Edit this file in the repository instead.
#
# Architecture: Cloudflare (edge CDN + TLS) → nginx (reverse proxy) → Next.js standalone
# ─────────────────────────────────────────────────────────────────────────────

# Proxy cache zone (site-specific name prevents collision with other sites)
proxy_cache_path /var/cache/nginx/__SERVICE_NAME__
    levels=1:2
    keys_zone=__SERVICE_NAME___cache:10m
    max_size=100m
    inactive=60m
    use_temp_path=off;

# Upstream with keepalive connections (avoids TCP handshake per request)
upstream __SERVICE_NAME___backend {
    server 127.0.0.1:__NEXTJS_PORT__;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server block ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__ www.__DOMAIN__;

    # Cloudflare Origin Certificate (free, 15-year validity)
    ssl_certificate     __SSL_CERT__;
    ssl_certificate_key __SSL_KEY__;

    # Modern SSL configuration (Cloudflare handles client-facing TLS negotiation)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:__SERVICE_NAME___SSL:2m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    charset utf-8;

    # ── Performance ──────────────────────────────────────────────────────────
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 200;
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;

    # ── Security Headers ────────────────────────────────────────────────────
    # NOTE: These are inherited by location blocks ONLY if the location block
    # has NO add_header directives of its own. Locations with add_header
    # (/_next/static, /resources, /) must repeat the headers they need.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://v2.jokeapi.dev https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://v2.jokeapi.dev https://analytics.google.com https://region1.google-analytics.com https://cloudflareinsights.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip (origin → Cloudflare; Cloudflare adds Brotli at the edge) ──────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 4;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        font/woff
        font/woff2
        application/vnd.ms-fontobject;

    # ═══════════════════════════════════════════════════════════════════════════
    # ROUTING
    # ═══════════════════════════════════════════════════════════════════════════

    # ── Static assets (hashed filenames) — serve from disk, bypass Node.js ───
    location /_next/static/ {
        alias __STANDALONE_DIR__/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        access_log off;
        try_files $uri @missing_asset;
    }

    # ── Public resources (resume PDF, images) — serve from disk ──────────────
    location /resources/ {
        alias __STANDALONE_DIR__/public/resources/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        access_log off;
        try_files $uri @missing_asset;
    }

    # ── Missing asset fallback — prevent stale CDN caching of 404s ───────────
    location @missing_asset {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        default_type text/plain;
        return 404 "Not found\n";
    }

    # ── SSE streaming for /api/chat — MUST disable buffering ─────────────────
    # Without proxy_buffering off, nginx buffers the entire LLM response
    # before forwarding, completely breaking the streaming chat UX.
    location /api/chat {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://__SERVICE_NAME___backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # ── Other API routes — rate limited, no caching ──────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://__SERVICE_NAME___backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }

    # ── Default: proxy to Next.js with caching ───────────────────────────────
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://__SERVICE_NAME___backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Proxy buffer tuning (2 vCPU / 1 GB RAM)
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;

        # Cache HTML pages — massively reduces Node.js CPU load
        proxy_cache __SERVICE_NAME___cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Security headers (repeated because add_header below overrides server-level)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://v2.jokeapi.dev https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://v2.jokeapi.dev https://analytics.google.com https://region1.google-analytics.com https://cloudflareinsights.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Security: Block hidden files (.git, .env, etc.) ──────────────────────
    location ~ /\. {
        deny all;
        log_not_found off;
    }

    # ── Security: Block common attack paths ──────────────────────────────────
    location ~* (wp-admin|wp-login|wp-includes|xmlrpc\.php|\.php$) {
        deny all;
        log_not_found off;
    }
}
